name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: coursier/setup-action@v3
        with:
          jvm: temurin:8
          apps: sbt
      - uses: coursier/cache-action@v8
      - name: Run tests
        run: sbt -v +test
